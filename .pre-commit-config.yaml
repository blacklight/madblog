repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        files: ^(src/python|tests)/.*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        files: ^(src/python|tests)/.*\.py$
        args:
          - --per-file-ignores=tests/*.py:E501,F401,E722,F541

  - repo: https://github.com/frnmst/md-toc
    rev: 9.0.0
    hooks:
      - id: md-toc
        args: ["-p", "github", "-l", "6"]
        files: ^README\.md$
